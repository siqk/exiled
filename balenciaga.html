<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:#000;
    color:#fff;
}

/* VIDEO BACKGROUND */
#bg-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    opacity:0.65;
    filter:grayscale(100%) contrast(120%);
    z-index:-2;
}

/* subtle overlay depth */
body::after{
    content:"";
    position:fixed;
    inset:0;
    background:radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 90%);
    z-index:-1;
}

/* ENTER SCREEN */
#enter-screen{
    position:fixed;
    width:100%;
    height:100%;
    background:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
    cursor:pointer;
    transition:opacity 0.8s ease;
}

#enter-screen span{
    font-size:11px;
    letter-spacing:8px;
    text-transform:uppercase;
    opacity:0.5;
    transition:0.3s ease;
}

#enter-screen:hover span{
    opacity:1;
    letter-spacing:10px;
}

/* MAIN */
.main{
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    perspective:1600px;
}

/* CARD */
.card{
    width:420px;
    padding:55px;
    border-radius:24px;
    background:transparent;
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
    transition:transform 0.12s ease, box-shadow 0.4s ease;
    box-shadow:0 0 60px rgba(255,255,255,0.05);
    position:relative;
    opacity:0;
    transform:translateY(20px) scale(0.98);
}

/* animated border glow */
.card::before{
    content:"";
    position:absolute;
    inset:-1px;
    border-radius:24px;
    padding:1px;
    background:linear-gradient(120deg, rgba(255,255,255,0.4), transparent, rgba(255,255,255,0.4));
    -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;
    mask-composite:exclude;
    opacity:0.2;
    transition:opacity 0.4s ease;
}

.card:hover::before{
    opacity:0.5;
}

.card.active{
    opacity:1;
    transform:translateY(0) scale(1);
}

/* PFP */
.pfp{
    width:110px;
    height:110px;
    border-radius:50%;
    object-fit:cover;
    filter:grayscale(100%) contrast(120%);
    border:2px solid rgba(255,255,255,0.25);
    margin-bottom:25px;
    transition:0.4s ease;
}

.pfp:hover{
    transform:scale(1.08);
    filter:grayscale(100%) contrast(160%);
}

/* Username */
.username{
    font-size:24px;
    font-weight:700;
    letter-spacing:6px;
    margin-bottom:15px;
    text-shadow:0 0 15px rgba(255,255,255,0.2);
}

/* Bio */
.subtitle{
    font-size:12px;
    opacity:0.6;
    margin-bottom:38px;
    letter-spacing:4px;
    min-height:16px;
}

/* Social Icons */
.socials{
    display:flex;
    justify-content:center;
    gap:28px;
}

.socials a{
    color:#fff;
    font-size:18px;
    transition:0.3s ease;
    opacity:0.6;
}

.socials a:hover{
    opacity:1;
    transform:translateY(-6px) scale(1.1);
    text-shadow:0 0 15px rgba(255,255,255,0.6);
}

/* Fade out */
.fade-out{
    opacity:0;
    pointer-events:none;
}
</style>

<body>

<!-- VIDEO WITH AUDIO -->
<video id="bg-video" loop playsinline>
    <source src="https://raw.githubusercontent.com/ccursedd/youknow/refs/heads/main/ssstik.io_%40dqmmyfx___1772494677219.mp4" type="video/mp4">
</video>

<div id="enter-screen">
    <span>[ click anywhere ]</span>
</div>

<div class="main">
    <div class="card" id="card">
        <img src="https://i.pinimg.com/736x/88/bf/46/88bf462d496ec27a348503260e841a11.jpg" class="pfp">
        <div class="username">balenciaga</div>
        <div class="subtitle" id="bio"></div>

        <div class="socials">
            <a href="https://discord.gg/xajPSeswW8" target="_blank"><i class="fa-brands fa-discord"></i></a>
            <a href="https://www.instagram.com/x_n7v/" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@gutcanvas" target="_blank"><i class="fa-brands fa-tiktok"></i></a>
        </div>
    </div>
</div>

<script>
const enterScreen = document.getElementById("enter-screen");
const card = document.getElementById("card");
const video = document.getElementById("bg-video");

enterScreen.addEventListener("click", () => {
    enterScreen.classList.add("fade-out");

    setTimeout(() => {
        card.classList.add("active");
    }, 300);

    video.currentTime = 0;
    video.volume = 1;
    video.play();
});

/* 3D tilt */
document.addEventListener("mousemove", (e) => {
    const x = (window.innerWidth / 2 - e.clientX) / 35;
    const y = (window.innerHeight / 2 - e.clientY) / 35;
    card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
});

/* SMOOTH TYPEWRITER */
const texts = [".gg/wspp", "makes 8 figs"];
const bio = document.getElementById("bio");

let textIndex = 0;
let charIndex = 0;
let isDeleting = false;

const typingSpeed = 75;
const deletingSpeed = 45;
const holdAfterTyping = 1200;
const holdAfterDeleting = 400;

function typeLoop() {
    const currentText = texts[textIndex];

    if (!isDeleting) {
        // typing forward
        bio.textContent = currentText.substring(0, charIndex + 1);
        charIndex++;

        if (charIndex === currentText.length) {
            setTimeout(() => isDeleting = true, holdAfterTyping);
        }
    } else {
        // deleting
        bio.textContent = currentText.substring(0, charIndex - 1);
        charIndex--;

        if (charIndex === 0) {
            isDeleting = false;
            textIndex = (textIndex + 1) % texts.length;
            setTimeout(() => {}, holdAfterDeleting);
        }
    }

    setTimeout(typeLoop, isDeleting ? deletingSpeed : typingSpeed);
}

typeLoop();
</script>
